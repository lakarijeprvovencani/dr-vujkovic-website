<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Admin Panel - Dr Branko Vujković</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      /* ===== GLOBAL FONT ===== */
      * { font-family: 'Inter', -apple-system, sans-serif !important; }
      body { background: #f4f7f9 !important; }

      /* ===== HEADER NAV BAR ===== */
      [class*="AppHeader"] {
        background: linear-gradient(135deg, #0e2f44, #1a5276) !important;
        box-shadow: 0 2px 12px rgba(0,0,0,0.18) !important;
        border-bottom: none !important;
      }
      [class*="AppHeader"] > div,
      [class*="AppHeader"] header,
      [class*="AppHeaderContent"] {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        min-height: 60px !important;
        padding-top: 4px !important;
        padding-bottom: 4px !important;
      }
      [class*="AppHeader"] a,
      [class*="AppHeader"] span,
      [class*="AppHeader"] button,
      [class*="AppHeader"] nav a {
        color: #fff !important;
        font-weight: 500 !important;
        font-size: 14px !important;
        letter-spacing: 0.2px !important;
      }
      [class*="AppHeader"] a:hover,
      [class*="AppHeader"] button:hover {
        opacity: 0.8 !important;
      }

      /* ===== SIDEBAR ===== */
      [class*="Sidebar"] {
        background: #fff !important;
        border-right: 1px solid #e2e8f0 !important;
      }

      /* ===== COLLECTION TOP ===== */
      [class*="CollectionTop"] {
        background: #fff !important;
        border-radius: 10px !important;
        border: 1px solid #e2e8f0 !important;
        padding: 20px 24px !important;
        margin-bottom: 16px !important;
      }

      /* ===== "NOVI" BUTTON ===== */
      a[href*="/new"],
      [class*="TopNewButton"] {
        background: #27ae60 !important;
        color: #fff !important;
        border: none !important;
        border-radius: 8px !important;
        padding: 10px 24px !important;
        font-weight: 600 !important;
        font-size: 14px !important;
        text-decoration: none !important;
        box-shadow: 0 2px 8px rgba(39,174,96,0.3) !important;
        transition: background 0.2s !important;
        display: inline-block !important;
      }
      a[href*="/new"]:hover,
      [class*="TopNewButton"]:hover {
        background: #2ecc71 !important;
      }

      /* ===== LIST CARDS - fix ugly blue hover ===== */
      [class*="ListCard"],
      [class*="ListCardLink"],
      [class*="ListCard"] > a {
        background: #fff !important;
        border-radius: 10px !important;
        border: 1px solid #e2e8f0 !important;
        box-shadow: none !important;
        transition: border-color 0.2s, box-shadow 0.2s !important;
        outline: none !important;
        margin-bottom: 8px !important;
      }
      /* Remove all blue outlines and focus rings */
      [class*="ListCard"]:hover,
      [class*="ListCardLink"]:hover,
      [class*="ListCard"] > a:hover {
        border-color: #2980b9 !important;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06) !important;
        outline: none !important;
      }
      [class*="ListCard"]:focus,
      [class*="ListCardLink"]:focus,
      [class*="ListCard"] > a:focus,
      [class*="ListCard"]:focus-within {
        outline: none !important;
        box-shadow: none !important;
        border-color: #2980b9 !important;
      }
      /* Kill any blue outline or box-shadow on all focusable elements */
      a:focus, a:focus-visible,
      div:focus, div:focus-visible {
        outline: none !important;
      }

      /* ===== EDITOR ===== */
      [class*="EditorContainer"],
      [class*="ControlPane"] {
        background: #fff !important;
        border-radius: 10px !important;
      }
      [class*="EditorToolbar"] {
        background: #fff !important;
        border-bottom: 1px solid #e2e8f0 !important;
      }

      /* ===== FORM INPUTS ===== */
      input[type="text"],
      input[type="email"],
      input[type="url"],
      input[type="number"],
      textarea {
        border-radius: 8px !important;
        border: 1.5px solid #e2e8f0 !important;
        padding: 12px 16px !important;
        font-size: 14px !important;
        background: #fff !important;
        transition: border-color 0.2s !important;
      }
      input:focus, textarea:focus {
        border-color: #2980b9 !important;
        box-shadow: 0 0 0 2px rgba(41,128,185,0.1) !important;
        outline: none !important;
      }

      /* ===== SELECT / KATEGORIJA - fix the white box over text ===== */
      /* The CMS uses react-select. The "clear" indicator is that white rounded box */
      [class*="css-"][class*="indicatorContainer"],
      [class*="clearIndicator"],
      [class*="indicatorSeparator"],
      [class*="css-"][class*="Indicator"]:not([class*="dropdown"]):not([class*="Down"]) {
        display: none !important;
        width: 0 !important;
        padding: 0 !important;
      }
      /* Style the select container itself */
      [class*="css-"][class*="control"],
      [class*="react-select"] [class*="control"] {
        border-radius: 8px !important;
        border: 1.5px solid #e2e8f0 !important;
        min-height: 46px !important;
        background: #fff !important;
        box-shadow: none !important;
      }
      [class*="css-"][class*="control"]:hover {
        border-color: #2980b9 !important;
      }
      /* Dropdown menu styling */
      [class*="css-"][class*="menu"] {
        border-radius: 8px !important;
        box-shadow: 0 4px 20px rgba(0,0,0,0.12) !important;
        border: 1px solid #e2e8f0 !important;
        overflow: hidden !important;
        z-index: 999 !important;
      }
      [class*="css-"][class*="option"] {
        padding: 10px 16px !important;
        font-size: 14px !important;
        transition: background 0.15s !important;
      }
      [class*="css-"][class*="option"]:hover {
        background: rgba(26,82,118,0.06) !important;
      }
      /* Selected option - keep the nice blue but subtle */
      [class*="css-"][class*="option"][class*="selected"],
      [class*="css-"][class*="option"][aria-selected="true"] {
        background: #2980b9 !important;
        color: #fff !important;
      }

      /* ===== LABELS ===== */
      label, [class*="Label"], [class*="ControlLabel"], legend {
        font-weight: 600 !important;
        color: #1a1a2e !important;
        font-size: 12px !important;
        text-transform: uppercase !important;
        letter-spacing: 0.8px !important;
      }

      /* ===== PUBLISH / SAVE BUTTONS ===== */
      [class*="ToolbarDropdown"] > button:first-child,
      [class*="PublishButton"] button {
        background: #27ae60 !important;
        border: none !important;
        border-radius: 8px !important;
        color: #fff !important;
        font-weight: 600 !important;
        padding: 8px 20px !important;
        font-size: 14px !important;
      }

      /* ===== MARKDOWN EDITOR ===== */
      [class*="MarkdownControl"],
      [class*="MarkdownWidget"] {
        border-radius: 10px !important;
        border: 1.5px solid #e2e8f0 !important;
        overflow: hidden !important;
      }

      /* ===== IMAGE WIDGET ===== */
      [class*="ImageWidget"],
      [class*="FileWidget"] {
        border-radius: 10px !important;
        border: 1.5px dashed #e2e8f0 !important;
        padding: 20px !important;
        background: #fafbfc !important;
      }

      /* ===== TOASTS ===== */
      [class*="Toast"] {
        border-radius: 10px !important;
      }

      /* ===== SCROLLBAR ===== */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }
    </style>
  </head>
  <body>
